services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openkor
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: openkor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - openkor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openkor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - openkor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  korauth:
    build: .
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://openkor:changeme@db:5432/openkor?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/etc/openkor/keys:ro
    networks:
      - openkor
    restart: unless-stopped

volumes:
  pgdata:

networks:
  openkor:
    external: true
